<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#F4EBD9" />
  <!-- pot body (clay) -->
  <path
    d="M6.5 12c0-2.2 1.8-4 4-4h11c2.2 0 4 1.8 4 4v10.5c0 2.5-2 4.5-4.5 4.5h-10c-2.5 0-4.5-2-4.5-4.5z"
    fill="#C9714B"
  />
  <!-- darker rim -->
  <rect x="5.5" y="7" width="21" height="3.5" rx="1.75" fill="#9F5234" />
  <!-- green fill (savings) -->
  <path
    d="M8.5 17.5c0-.5.4-1 1-1h13c.6 0 1 .5 1 1v5.5c0 1.4-1.1 2.5-2.5 2.5h-10c-1.4 0-2.5-1.1-2.5-2.5z"
    fill="#3D5234"
  />
  <!-- meniscus highlight -->
  <rect
    x="9.5"
    y="16.5"
    width="14"
    height="0.8"
    rx="0.4"
    fill="#FFFFFF"
    fill-opacity="0.35"
  />
  <!-- side shine -->
  <ellipse cx="11" cy="14.5" rx="1.1" ry="2.2" fill="#FFFFFF" fill-opacity="0.3" />
</svg>
